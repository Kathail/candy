<div class="flex items-center justify-between mb-4">
    <h3 class="text-lg font-semibold">{{ lead.name }}</h3>
    <button onclick="closeEditModal()" class="text-muted hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

<!-- Auto-save form -->
<form action="/leads/{{ lead.id }}/update" method="POST" class="space-y-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

    <div>
        <label class="block text-xs text-muted mb-1">Name *</label>
        <input type="text" name="name" required value="{{ lead.name }}" onchange="this.form.submit()"
               class="w-full bg-panel2 border border-border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand"/>
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs text-muted mb-1">Phone</label>
            <input type="tel" name="phone" value="{{ lead.phone or '' }}" onchange="this.form.submit()"
                   class="w-full bg-panel2 border border-border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand"
                   placeholder="(555) 123-4567"/>
        </div>
        <div>
            <label class="block text-xs text-muted mb-1">City</label>
            <input type="text" name="city" value="{{ lead.city or '' }}" onchange="this.form.submit()"
                   class="w-full bg-panel2 border border-border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand"
                   placeholder="Springfield"/>
        </div>
    </div>

    <div>
        <label class="block text-xs text-muted mb-1">Address</label>
        <input type="text" name="address" value="{{ lead.address or '' }}" onchange="this.form.submit()"
               class="w-full bg-panel2 border border-border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand"
               placeholder="123 Main St"/>
    </div>

    <div>
        <label class="block text-xs text-muted mb-1">Lead Source</label>
        <select name="lead_source" onchange="this.form.submit()"
                class="w-full bg-panel2 border border-border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand">
            <option value="">-- Select --</option>
            {% for src in ['referral', 'walk-in', 'cold-call', 'website', 'social', 'other'] %}
            <option value="{{ src }}" {% if lead.lead_source == src %}selected{% endif %}>{{ src|capitalize }}</option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label class="block text-xs text-muted mb-1">Notes</label>
        <textarea name="notes" rows="2" onchange="this.form.submit()"
                  class="w-full bg-panel2 border border-border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand"
                  placeholder="Notes...">{{ lead.notes or '' }}</textarea>
    </div>
</form>

<!-- Stats -->
<div class="py-3 border-t border-border text-xs text-muted">
    Added {{ lead.created_at.strftime('%b %d, %Y') if lead.created_at else 'Unknown' }}
    {% if lead.lead_source %} · Source: {{ lead.lead_source }}{% endif %}
</div>

<!-- Actions -->
<div class="pt-3 border-t border-border space-y-2">
    <form action="/leads/{{ lead.id }}/convert" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <button type="submit" class="w-full bg-good/10 hover:bg-good/20 text-good text-sm font-semibold px-4 py-2 rounded-md transition">
            Convert to Customer
        </button>
    </form>

    <form id="delete-lead-form" action="/leads/{{ lead.id }}/delete" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <button type="button" onclick="confirmDeleteLead('{{ lead.name }}')"
                class="w-full bg-danger/10 hover:bg-danger/20 text-danger text-xs font-semibold px-4 py-2 rounded-md transition">
            Delete Lead
        </button>
    </form>
</div>
