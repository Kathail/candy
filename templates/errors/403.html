<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8" />
    <title>403 - Access Denied</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <script src="{{ url_for('static', filename='vendor/tailwind.js') }}"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: "#0b1220",
                        panel: "#1e293b",
                        danger: "#ef4444",
                        muted: "#94a3b8",
                    },
                },
            },
        };
    </script>
</head>
<body class="h-full bg-bg text-slate-200 antialiased">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="text-center">
            <div class="text-8xl font-bold text-danger mb-4">403</div>
            <h1 class="text-2xl font-semibold mb-2">Access Denied</h1>
            <p class="text-muted mb-8">You don't have permission to access this page.</p>
            <a href="/" class="inline-block bg-panel hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-lg transition">
                Go to Dashboard
            </a>
        </div>
    </div>
</body>
</html>
