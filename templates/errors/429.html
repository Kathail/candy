{% extends "errors/base_error.html" %}
{% block title %}429 - Too Many Requests{% endblock %}
{% block content %}
<div class="text-8xl font-bold text-warn mb-4">429</div>
<h1 class="text-2xl font-semibold mb-2">Too Many Requests</h1>
<p class="text-muted mb-8">You're making requests too quickly. Please wait a moment and try again.</p>
<div class="flex gap-4 justify-center">
    <a href="/" class="inline-block bg-panel hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-lg transition">Go to Dashboard</a>
    <button onclick="location.reload()" class="inline-block bg-warn hover:bg-yellow-500 text-black font-semibold py-3 px-6 rounded-lg transition">Try Again</button>
</div>
{% endblock %}
