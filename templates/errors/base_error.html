<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8" />
    <title>{% block title %}Error{% endblock %} - Candy Route Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <script src="{{ url_for('static', filename='vendor/tailwind.js') }}"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: "#0b1220",
                        panel: "#1e293b",
                        brand: "#2563eb",
                        muted: "#94a3b8",
                        good: "#22c55e",
                        warn: "#facc15",
                        danger: "#ef4444",
                    },
                },
            },
        };
    </script>
</head>
<body class="h-full bg-bg text-slate-200 antialiased">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="text-center">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
