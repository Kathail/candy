{% extends "errors/base_error.html" %}
{% block title %}Offline{% endblock %}
{% block content %}
<div class="text-6xl mb-4">&#128268;</div>
<h1 class="text-2xl font-semibold mb-2">You're Offline</h1>
<p class="text-muted mb-8">Check your internet connection and try again.</p>
<button onclick="location.reload()" class="inline-block bg-warn hover:bg-yellow-500 text-black font-semibold py-3 px-6 rounded-lg transition">Retry</button>
{% endblock %}
