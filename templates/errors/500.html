{% extends "errors/base_error.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="text-8xl font-bold text-danger mb-4">500</div>
<h1 class="text-2xl font-semibold mb-2">Server Error</h1>
<p class="text-muted mb-8">Something went wrong on our end. Please try again later.</p>
<div class="flex gap-4 justify-center">
    <a href="/" class="inline-block bg-panel hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-lg transition">Go to Dashboard</a>
    <button onclick="location.reload()" class="inline-block bg-danger hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-lg transition">Try Again</button>
</div>
{% endblock %}
